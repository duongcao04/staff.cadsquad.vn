version: '3.8'
name: csd-staff

services:
  database:
    image: postgres:16
    container_name: database
    restart: always
    env_file: .env
    environment:
      TZ: Asia/Ho_Chi_Minh
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "5432:5432"
    volumes:
      - '${DATA_PATH}/postgres:/var/lib/postgresql/data'
      - '${LOG_PATH}/postgres:/var/log/postgresql'
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}']
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - app-network

  redis:
    image: redis:alpine
    container_name: cache
    # Thêm --appendonly yes để đảm bảo Redis lưu dữ liệu xuống đĩa ngay lập tức
    command: redis-server --requirepass ${REDIS_PASSWORD} --appendonly yes
    env_file: .env
    environment:
      TZ: Asia/Ho_Chi_Minh
    volumes:
      - ${DATA_PATH}/redis:/data
    ports:
      - "6379:6379"
    networks:
      - app-network
    restart: always

  backend:
    build: 
      context: ./server
      args:
        DATABASE_URL: ${DATABASE_URL}
    container_name: backend
    restart: always
    depends_on:
      database: { condition: service_healthy }
    volumes:
      - '${LOG_PATH}/backend:/app/logs'
    env_file: .env
    environment:
      TZ: Asia/Ho_Chi_Minh
    networks:
      - app-network

  web_client:
    build:
      context: ./client
      args:
        VITE_APP_URL: ${CLIENT_URL}
        VITE_APP_TITLE: ${APP_TITLE}
        VITE_API_ENDPOINT: ${API_ENDPOINT}
        VITE_FIREBASE_API_KEY: ${FIREBASE_API_KEY}
        VITE_FIREBASE_PROJECT_ID: ${FIREBASE_PROJECT_ID}
        VITE_FIREBASE_VAPID_KEY: ${FIREBASE_VAPID_KEY}
        VITE_FIREBASE_AUTH_DOMAIN: ${FIREBASE_AUTH_DOMAIN}
        VITE_FIREBASE_DATABASE_URL: ${FIREBASE_DATABASE_URL}
        VITE_FIREBASE_STORAGE_BUCKET: ${FIREBASE_STORAGE_BUCKET}
        VITE_FIREBASE_MESSAGING_SENDER_ID: ${FIREBASE_MESSAGING_SENDER_ID}
        VITE_FIREBASE_APP_ID: ${FIREBASE_APP_ID}
        VITE_FIREBASE_MEASUREMENT_ID: ${FIREBASE_MEASUREMENT_ID}
    container_name: web_client
    restart: always
    env_file: .env
    environment:
      TZ: Asia/Ho_Chi_Minh
    expose:
      - "80"
    volumes:
      - ./client/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - /etc/letsencrypt:/etc/letsencrypt:ro # Ánh xạ chứng chỉ SSL cho Nginx nội bộ
    networks:
      - app-network

  nginx-proxy-manager:
    image: 'jc21/nginx-proxy-manager:latest'
    container_name: proxy-manager
    environment:
      TZ: Asia/Ho_Chi_Minh
    restart: always
    env_file: .env
    ports:
      - '80:80'   # Cổng nhận HTTP
      - '443:443' # Cổng nhận HTTPS
      - '81:81'   # Cổng quản lý UI (Truy cập http://IP-VPS:81)
    volumes:
      - ./data/npm:/data
      - /etc/letsencrypt:/etc/letsencrypt:ro # FIX: Ánh xạ chứng chỉ từ hệ thống vào
    networks:
      - app-network

  pgadmin:
    image: dpage/pgadmin4
    container_name: pgadmin
    restart: always
    env_file: .env
    ports:
      - '${PGADMIN_PORT}:80'
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_EMAIL}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_PASSWORD}
    depends_on:
      database:
        condition: service_healthy
    networks:
      - app-network

networks:
  app-network:
    driver: bridge
