version: '3.8'
name: csd-staff

services:
  database:
    image: postgres:16-alpine
    container_name: database
    restart: always
    env_file: .env
    command: postgres -c shared_buffers=128MB -c max_connections=50
    environment:
      TZ: Asia/Ho_Chi_Minh
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "5432:5432" 
    volumes:
      - '${DATA_PATH}/postgres:/var/lib/postgresql/data'
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}']
      interval: 10s
    deploy:
      resources:
        limits:
          memory: 350M # Giảm nhẹ để nhường RAM cho Jenkins
    networks:
      - app-network

  redis:
    image: redis:alpine
    container_name: redis
    command: redis-server --requirepass ${REDIS_PASSWORD} --appendonly yes --maxmemory 100mb --maxmemory-policy allkeys-lru
    restart: always
    ports:
      - ${REDIS_PORT}:6379
    deploy:
      resources:
        limits:
          memory: 100M
    networks:
      - app-network

  backend:
    image: ${DOCKER_USER}/csd-backend:latest 
    container_name: backend
    restart: always
    depends_on:
      database: { condition: service_healthy }
    env_file: .env
    deploy:
      resources:
        limits:
          memory: 450M
    networks:
      - app-network

  web_client:
    image: ${DOCKER_USER}/csd-client:latest
    container_name: web_client
    restart: always
    env_file: .env
    expose:
      - "80"
    deploy:
      resources:
        limits:
          memory: 150M
    networks:
      - app-network

  nginx-proxy-manager:
    image: 'jc21/nginx-proxy-manager:latest'
    container_name: proxy-manager
    restart: always
    ports:
      - '80:80'
      - '443:443'
      - '81:81'
    volumes:
      - ./data/npm:/data
      - ./data/letsencrypt:/etc/letsencrypt
    deploy:
      resources:
        limits:
          memory: 250M
    networks:
      - app-network

  # Tắt pgadmin để tiết kiệm RAM, chỉ bật lên khi cần debug DB
  pgadmin:
    image: dpage/pgadmin4
    container_name: pgadmin
    restart: "no" # Chỉnh thành "no" để không tự chạy làm tốn RAM
    env_file: .env
    ports:
      - '${PGADMIN_PORT}:80'
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_EMAIL}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_PASSWORD}
    deploy:
      resources:
        limits:
          memory: 200M
    networks:
      - app-network

networks:
  app-network:
    driver: bridge