name: Build and Deploy CSD Staff

on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]
  workflow_dispatch:
    inputs:
      message:
        description: 'Lý do chạy thủ công'
        required: false
        default: 'Triggered manually'

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  build-and-push-docker:
    name: Build & Push Docker Images
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # Đã sửa lại có dấu | ở đây
      - name: Print Trigger Message
        if: github.event_name == 'workflow_dispatch'
        run: |
          echo "Tin nhắn nhận được: ${{ github.event.inputs.message }}"

      - name: Inject .env file for Build
        run: |
          echo "${{ secrets.ENV_PRODUCTION }}" > ./client/.env
          echo "${{ secrets.ENV_PRODUCTION }}" > ./server/.env

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and push Backend Image
        run: |
          docker build -t haiduong004/csd-backend:latest ./server
          docker push haiduong004/csd-backend:latest

      - name: Build and push Client Image
        run: |
          docker build -t haiduong004/csd-client:latest ./client
          docker push haiduong004/csd-client:latest

  deploy-to-vps:
    name: Deploy to VPS
    needs: build-and-push-docker
    runs-on: ubuntu-latest

    steps:
      - name: Execute SSH commands on VPS
        uses: appleboy/ssh-action@v1.0.3
        env:
          ENV_PRODUCTION_CONTENT: ${{ secrets.ENV_PRODUCTION }}
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USERNAME }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: 22
          envs: ENV_PRODUCTION_CONTENT
          script: |
            echo "1. Đang truy cập vào thư mục dự án..."
            cd /home/prod/apps/csd-staff
            
            echo "2. Cập nhật file .env trên VPS..."
            echo "$ENV_PRODUCTION_CONTENT" > .env
            
            echo "3. Kéo Image mới nhất từ Docker Hub về VPS..."
            docker compose pull backend web_client
            
            echo "4. Khởi động lại các container với Image mới..."
            docker compose up -d
            
            echo "5. Dọn dẹp các Image rác để tránh đầy ổ cứng VPS..."
            docker image prune -f