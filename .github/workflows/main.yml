name: Build and Deploy CSD Staff

on:
  # 1. Chạy tự động khi có code mới đẩy lên nhánh master
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]
    
  # 2. Cho phép kích hoạt thủ công từ giao diện
  workflow_dispatch:
    inputs:
      message:
        description: 'Lý do chạy thủ công'
        required: false
        default: 'Triggered manually'

# Khắc phục cảnh báo "Node.js 20 actions are deprecated"
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  # ==========================================
  # JOB 1: BUILD & PUSH DOCKER IMAGES
  # ==========================================
  build-and-push-docker:
    name: Build & Push Docker Images
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Print Trigger Message
        if: github.event_name == 'workflow_dispatch'
        run: echo "Tin nhắn nhận được: ${{ github.event.inputs.message }}"

      # Đăng nhập vào Docker Hub bằng thông tin trong GitHub Secrets
      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      # Build và Push Backend
      - name: Build and push Backend Image
        run: |
          docker build -t haiduong004/csd-backend:latest ./server
          docker push haiduong004/csd-backend:latest

      # Build và Push Frontend
      - name: Build and push Client Image
        run: |
          docker build -t haiduong004/csd-client:latest ./client
          docker push haiduong004/csd-client:latest

  # ==========================================
  # JOB 2: DEPLOY LÊN VPS QUA SSH
  # ==========================================
  deploy-to-vps:
    name: Deploy to VPS
    needs: build-and-push-docker # Bắt buộc phải chờ Job Build chạy xong mới được Deploy
    runs-on: ubuntu-latest

    steps:
      - name: Execute SSH commands on VPS
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USERNAME }}
          key: ${{ secrets.VPS_SSH_KEY }} # Dùng Private Key bạn vừa lấy bằng lệnh cat
          port: 22
          script: |
            echo "1. Đang truy cập vào thư mục dự án..."
            cd /home/prod/apps/csd-staff
            
            echo "2. Kéo Image mới nhất từ Docker Hub về VPS..."
            docker compose pull backend web_client
            
            echo "3. Khởi động lại các container với Image mới..."
            docker compose up -d
            
            echo "4. Dọn dẹp các Image rác để tránh đầy ổ cứng VPS..."
            docker image prune -f