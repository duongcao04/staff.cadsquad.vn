# 1. The name of the workflow as it will appear in the GitHub UI
name: Github Jenkins flow

# 2. The event that triggers the workflow
on: 
  push:
    branches: [ "master" ] # Triggers when pushing to the 'main' branch
  pull_request:
    branches: [ "master" ] # Triggers when a PR is opened against 'main'

# 3. The jobs that will run
jobs:
  build:
    # Specifies the operating system for the runner (the server executing the code)
    runs-on: ubuntu-latest

    # 4. The sequence of steps inside this job
    steps:
      # Step A: Brings your repository's code into the runner
      - name: Checkout repository
        uses: actions/checkout@v4

      # Step B: Runs a basic command line script
      - name: Say Hello
        run: echo "Hello, GitHub Actions! The code has been checked out."
        
      # Step C: Running multiple lines of scripts
      - name: Run multiple commands
        run: |
          echo "This is a multi-line script."
          node -v || echo "Node is not installed by default here, but we could add it!"