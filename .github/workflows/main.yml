name: Github Jenkins flow

on:
  # 1. Chạy tự động khi có code mới đẩy lên nhánh master
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]
    
  # 2. Cho phép kích hoạt thủ công từ giao diện hoặc qua API (từ Jenkins)
  workflow_dispatch:
    inputs:
      message:
        description: 'Tin nhắn gửi từ hệ thống khác'
        required: false
        default: 'Triggered manually'

# Khắc phục cảnh báo "Node.js 20 actions are deprecated"
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    # Server của GitHub sẽ chạy hệ điều hành Ubuntu mới nhất
    runs-on: ubuntu-latest

    steps:
      # Bước 1: Kéo source code về máy chủ của GitHub
      - name: Checkout repository
        uses: actions/checkout@v4

      # Bước 2: In ra lời nhắn nếu được trigger từ Jenkins
      - name: Print Trigger Message
        if: github.event_name == 'workflow_dispatch'
        run: |
          echo "Bản build được kích hoạt qua API!"
          echo "Tin nhắn nhận được: ${{ github.event.inputs.message }}"

      # Bước 3: Cài đặt Node.js
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      # Bước 4: Cài đặt Bun (Công cụ bạn đang dùng trong dự án)
      - name: Setup Bun
        uses: oven-sh/setup-bun@v1
        with:
          bun-version: latest

      # Bước 5: Cài đặt thư viện và Build thử thư mục Client để check lỗi
      - name: Install dependencies and Build Client
        run: |
          echo "Bắt đầu cài đặt thư viện cho Client..."
          cd client
          bun install
          echo "Bắt đầu build Client..."
          bun run build